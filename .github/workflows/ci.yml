name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,dashboard]"

      - name: Run tests
        run: python -m pytest

      - name: Run lint
        run: python -m ruff check telefix tests examples scripts

      - name: Evaluate passing fixture
        id: telefix-evaluate
        uses: ./.github/actions/evaluate
        with:
          trajectory-path: examples/telecom/high_latency/expected_trajectory.json
          policy-path: examples/telecom/high_latency/policy.yaml
          json-output-path: telefix-report.json

      - name: Show Telefix decision
        run: |
          echo "decision=${{ steps.telefix-evaluate.outputs.deployment-decision }}"
          echo "unsafe_action_rate=${{ steps.telefix-evaluate.outputs.unsafe-action-rate }}"
          echo "tool_precision=${{ steps.telefix-evaluate.outputs.tool-precision }}"
          echo "loop_detected=${{ steps.telefix-evaluate.outputs.loop-detected }}"
          echo "state_drift_detected=${{ steps.telefix-evaluate.outputs.state-drift-detected }}"
